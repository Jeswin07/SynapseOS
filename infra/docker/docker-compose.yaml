services:

  postgres:
    image: postgres:17

    container_name: synapseos-postgres

    environment:
      POSTGRES_DB: synapseos
      POSTGRES_USER: synapseos
      POSTGRES_PASSWORD: synapseos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: