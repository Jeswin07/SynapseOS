services:
  postgres:
    image: postgres:17
    container_name: synapseos-postgres
    environment:
      POSTGRES_DB: synapseos
      POSTGRES_USER: synapseos
      POSTGRES_PASSWORD: synapseos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: synapseos-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: synapseos
      MINIO_ROOT_PASSWORD: synapseos123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: synapseos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    container_name: synapseos-neo4j

    restart: unless-stopped

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/synapseos

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs: